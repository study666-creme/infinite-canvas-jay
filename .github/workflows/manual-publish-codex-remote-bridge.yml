name: Manual Publish Codex Remote Bridge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-publish-codex-remote-bridge
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: canvas-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check package version
        id: package
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          published=$(npm view "$name@$version" version 2>/dev/null || true)
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ -n "$published" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm token
        id: npm-token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN is not configured; skipping npm publish."
          fi

      - name: Publish to npm
        if: steps.package.outputs.should_publish == 'true' && steps.npm-token.outputs.has_token == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip existing version
        if: steps.package.outputs.should_publish != 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npm, skipping publish."

      - name: Skip missing token
        if: steps.package.outputs.should_publish == 'true' && steps.npm-token.outputs.has_token != 'true'
        run: echo "NPM_TOKEN is missing, so ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} was not published."
